appId: com.open-codex.app
productName: "Open Codex"
copyright: "Copyright © 2024 Open Codex contributors"

# Include the app source and all runtime dependencies. Native modules
# (better-sqlite3, node-pty) are rebuilt automatically via postinstall.
files:
  - src/**/*
  - package.json
  - node_modules/**/*

# Unpack native .node addons from the ASAR archive so they can be loaded
# by the OS dynamic linker at runtime.
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/node-pty/**"

mac:
  category: public.app-category.developer-tools
  # Apple Silicon + Intel universal binary (Electron 31+ auto-targets both).
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  # DMG appearance — optional, customise after adding assets.
  # icon: build/icon.icns
  # backgroundColor: "#ffffff"
  # window:
  #   width: 540
  #   height: 380

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: msi
      arch:
        - x64
  # icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Development
  # icon: build/icons

# Publish configuration — uncomment and fill when ready to ship.
# publish:
#   provider: github
#   owner: open-codex
#   repo: open-codex
