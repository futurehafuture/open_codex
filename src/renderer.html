<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Codex</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      --serif: "Songti SC", "STSong", "Source Han Serif SC", "Noto Serif SC", Georgia, "Times New Roman", serif;
      --bg:#ffffff; --sidebar:#f5f3ef; --hover:#ece9e2;
      --line:#e9e6df; --muted:#8c877e; --faint:#b4afa4; --panel:#f6f4ef; --soft:#f1eee8; --text:#2b2926;
      --accent:#cc6d4e;
    }
    * { box-sizing: border-box; }
    body { margin:0; height:100vh; overflow:hidden; color:var(--text); background:var(--bg); }
    button { font:inherit; border:0; background:none; cursor:pointer; color:inherit; }
    .app { display:grid; grid-template-columns: 260px 1fr; height:100vh; transition:grid-template-columns .2s ease; }
    .app.sidebar-collapsed { grid-template-columns: 0 1fr; }
    .app.sidebar-collapsed .sidebar { padding-left:0; padding-right:0; }

    /* Sidebar ------------------------------------------------------------- */
    .sidebar { background:var(--sidebar); border-right:1px solid var(--line); padding:44px 10px 0; display:flex; flex-direction:column; gap:2px; overflow:auto; }
    .sidebar::-webkit-scrollbar { width:8px; }
    .sidebar::-webkit-scrollbar-thumb { background:#dcd8cf; border-radius:8px; }
    /* Sits to the RIGHT of the native macOS window buttons (trafficLightPosition x:16). */
    .traffic { position:fixed; top:11px; left:86px; display:flex; align-items:center; gap:4px; -webkit-app-region:drag; z-index:5; }
    .ghost-icon { -webkit-app-region:no-drag; width:28px; height:28px; border-radius:8px; display:grid; place-items:center; color:var(--muted); cursor:pointer; }
    .ghost-icon:hover { background:var(--hover); color:var(--text); }

    .seg { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; background:#e9e6df; border-radius:11px; padding:3px; margin:2px 4px 8px; }
    .seg-item { display:flex; align-items:center; justify-content:center; gap:6px; height:30px; border-radius:8px; font-size:12.5px; font-weight:600; color:var(--muted); transition:background .15s ease, color .15s ease, box-shadow .15s ease; }
    .seg-item svg { width:15px; height:15px; }
    .seg-item:hover { color:var(--text); }
    .seg-item.active { background:var(--bg); color:var(--text); box-shadow:0 1px 2px rgba(60,50,40,.12); }

    .side-nav { display:grid; gap:1px; }
    .side-nav .nav-row { display:flex; align-items:center; gap:11px; height:34px; padding:0 8px; border-radius:9px; font-size:13.5px; font-weight:550; color:#43403a; cursor:pointer; }
    .side-nav .nav-row:hover { background:var(--hover); }
    .nav-icon { width:18px; flex:0 0 18px; display:grid; place-items:center; color:#6c685f; }
    .nav-icon svg { width:17px; height:17px; }

    .section { margin:12px 8px 4px; color:var(--faint); font-size:11.5px; font-weight:600; }
    .project-list { display:grid; gap:1px; padding-bottom:8px; }
    /* sidebar.js renders project group-headers + thread rows here; keep them
       quiet + flat so they read like Claude's "Recents", not the top nav. */
    #projectList .nav-row { display:flex; align-items:center; gap:7px; min-height:22px; padding:5px 8px 2px; font-size:11px; font-weight:600; color:var(--faint); letter-spacing:.02em; }
    #projectList .nav-row .nav-icon { color:var(--faint); font-size:11px; width:auto; flex:0 0 auto; }
    .conversation { padding:2px 8px 6px 15px; color:var(--faint); font-size:12px; }
    .history { display:grid; gap:1px; padding-left:0; min-width:0; }
    .history-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:6px 8px; border-radius:9px; color:#48443d; min-width:0; cursor:pointer; }
    .history-row:hover { background:var(--hover); }
    .thread-title { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; font-weight:500; min-width:0; }
    .history-row:hover .thread-title { color:var(--text); }
    .row-right { display:flex; align-items:center; gap:6px; flex:0 0 auto; }
    .time { color:var(--faint); white-space:nowrap; font-size:11px; font-weight:500; }
    .thread-del { -webkit-app-region:no-drag; opacity:0; color:var(--faint); font-size:15px; line-height:1; padding:0 2px; transition:opacity .12s ease, color .12s ease; }
    .history-row:hover .thread-del { opacity:1; }
    .thread-del:hover { color:#b3261e; }

    .side-foot { margin-top:auto; position:sticky; bottom:0; background:var(--sidebar); padding:8px 0 10px; display:grid; gap:1px; }
    .side-foot .nav-row { display:flex; align-items:center; gap:11px; height:34px; padding:0 8px; border-radius:9px; font-size:13.5px; font-weight:550; color:#43403a; cursor:pointer; }
    .side-foot .nav-row:hover { background:var(--hover); }
    .account-row { display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:10px; cursor:pointer; margin-top:2px; }
    .account-row:hover { background:var(--hover); }
    .avatar { width:26px; height:26px; border-radius:50%; display:grid; place-items:center; background:var(--accent); color:#fff; font-size:12px; font-weight:700; flex:0 0 26px; }
    .account-copy { display:flex; flex-direction:column; line-height:1.2; min-width:0; }
    .account-copy strong { font-size:13px; font-weight:600; }
    .account-copy span { color:var(--muted); font-size:11px; }
    .account-chevron { margin-left:auto; color:var(--faint); font-size:11px; }
    /* Main ---------------------------------------------------------------- */
    /* min-height:0 stops the message console's content from forcing this grid
       item taller than the viewport (which pushed the composer off-screen). */
    .main { display:grid; grid-template-rows:44px 1fr auto; min-width:0; min-height:0; background:var(--bg); }
    .topbar { height:44px; display:flex; align-items:center; justify-content:flex-end; gap:6px; padding:0 16px; -webkit-app-region:drag; }
    .icon-button { -webkit-app-region:no-drag; width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:var(--muted); font-size:16px; }
    .icon-button.active, .icon-button:hover { background:var(--soft); color:var(--text); }
    .brand-mark { -webkit-app-region:no-drag; margin-left:6px; color:var(--accent); font-size:17px; line-height:1; user-select:none; }

    /* Row is minmax(0,1fr) (not the implicit `auto`) so the stage is bounded to
       the viewport height; the message console then scrolls instead of growing. */
    .stage-shell { display:grid; grid-template-columns:1fr 0; grid-template-rows:minmax(0, 1fr); min-height:0; transition:grid-template-columns .22s ease; }
    .stage-shell.tools-open { grid-template-columns:minmax(420px, 1fr) 380px; }
    .stage { min-width:0; display:flex; align-items:center; justify-content:center; padding:24px 36px 60px; transition:border .22s ease; overflow:auto; }
    .tools-open .stage { border-right:1px solid var(--line); }
    .hero { width:min(760px, 92%); display:grid; gap:22px; justify-items:center; }
    .tools-open .hero { width:min(520px, 92%); }
    .stage-shell.conversation-active .stage { align-items:stretch; padding:14px 36px 24px; overflow:hidden; }
    .stage-shell.conversation-active .hero { width:min(920px, 96%); height:100%; min-height:0; grid-template-rows:auto minmax(0, 1fr) auto; gap:14px; align-content:stretch; }
    /* In a live conversation only the status / console / composer remain; the
       home-only greeting, suggestion pills and meta row collapse out. */
    .stage-shell.conversation-active .greeting-wrap,
    .stage-shell.conversation-active .suggestions,
    .stage-shell.conversation-active .meta { display:none; }
    /* Explicit row placement — agent-status is display:none after each turn, so
       relying on order + auto-placement would drop the console into the `auto`
       track and let it grow unbounded, pushing the composer off-screen. */
    .stage-shell.conversation-active .agent-status { grid-row:1; }
    .stage-shell.conversation-active .agent-console { grid-row:2; }
    .stage-shell.conversation-active .composer-wrap { grid-row:3; }
    .tools-open.conversation-active .hero { width:min(720px, 96%); }

    .greeting-wrap { display:grid; gap:9px; justify-items:center; text-align:center; }
    h1 { margin:0; font-family:var(--serif); font-size:40px; line-height:1.08; font-weight:500; text-align:center; letter-spacing:.01em; color:var(--text); }
    .spark { color:var(--accent); margin-right:8px; font-family:var(--serif); }
    .greeting-sub { margin:0; color:var(--muted); font-size:13.5px; }
    .workspace-name { white-space:nowrap; color:#5c574e; font-weight:600; }

    .composer-wrap { width:100%; }
    .composer { min-height:108px; border:1px solid var(--line); border-radius:20px; background:var(--bg); padding:16px 18px 12px; display:grid; grid-template-rows:1fr auto; box-shadow:0 2px 12px rgba(70,55,40,.05); transition:border-color .15s ease, box-shadow .15s ease; }
    .composer:focus-within { border-color:#d9cfc0; box-shadow:0 6px 22px rgba(70,55,40,.09); }
    .prompt-input { width:100%; min-height:46px; resize:none; border:0; outline:0; color:var(--text); font-size:15px; line-height:1.55; font-family:inherit; background:transparent; }
    .prompt-input::placeholder { color:var(--faint); }
    .compose-row { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; min-height:34px; }
    .compose-action { display:inline-flex; align-items:center; justify-content:center; gap:6px; color:var(--muted); font-size:12px; font-weight:600; white-space:nowrap; height:30px; padding:0 8px; border-radius:8px; cursor:pointer; }
    .compose-action:hover { background:var(--soft); color:var(--text); }
    .compose-plus { width:32px; height:32px; padding:0; border:1px solid var(--line); border-radius:50%; font-size:16px; }
    .compose-plus:hover { background:var(--soft); }
    .model-chip { display:inline-flex; align-items:center; gap:5px; color:var(--text); font-size:12.5px; font-weight:600; white-space:nowrap; height:30px; padding:0 9px; border-radius:8px; cursor:pointer; }
    .model-chip:hover { background:var(--soft); }
    .model-chip .muted { color:var(--muted); font-weight:500; }
    .spacer { flex:1; }
    .send { width:34px; height:34px; border-radius:50%; background:var(--text); color:var(--bg); display:grid; place-items:center; font-size:16px; line-height:1; transition:background .16s ease, transform .16s ease; }
    .send:hover { background:#000; transform:translateY(-1px); }
    .send.stop { background:#27292d; font-size:13px; }
    .send.stop:hover { background:#b3261e; }
    .send.stopping { background:#c7c9cc; cursor:wait; }

    .suggestions { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }
    .pill { display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 14px; border:1px solid var(--line); border-radius:11px; background:var(--bg); color:#4b463e; font-size:13px; font-weight:550; cursor:pointer; transition:background .14s ease, border-color .14s ease, transform .14s ease; }
    .pill:hover { background:var(--soft); border-color:#ddd4c6; transform:translateY(-1px); }
    .pill svg { width:15px; height:15px; color:var(--accent); }

    .meta { display:flex; align-items:center; justify-content:center; gap:16px; padding:2px 4px 0; color:var(--muted); font-size:12px; font-weight:500; }
    .meta-item { display:flex; align-items:center; gap:6px; min-width:0; white-space:nowrap; }
    .meta-item.clickable { cursor:pointer; }
    .meta-item.clickable:hover { color:var(--text); }
    .meta-item strong { color:#5c574e; font-weight:600; }
    .meta-icon { color:var(--muted); font-size:13px; line-height:1; }
    .chevron { color:var(--faint); font-size:11px; }

    .toast { position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(8px); background:#2b2926; color:#fff; font-size:12.5px; padding:9px 15px; border-radius:10px; opacity:0; pointer-events:none; transition:opacity .18s ease, transform .18s ease; z-index:80; box-shadow:0 8px 24px rgba(0,0,0,.18); }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Structured agent console -------------------------------------------------- */
    .agent-console { width:100%; max-height:320px; border:none; background:transparent; color:var(--text); padding:0; overflow:auto; text-align:left; font-size:13px; line-height:1.6; display:flex; flex-direction:column; gap:10px; min-height:0; }
    .agent-console:empty { display:none; }
    .stage-shell.conversation-active .agent-console { display:flex; max-height:none; min-height:0; }
    .msg { display:flex; }
    .msg.user { justify-content:flex-end; }
    .msg .bubble { max-width:86%; padding:8px 12px; border-radius:10px; white-space:pre-wrap; word-break:break-word; line-height:1.5; }
    .msg.user .bubble { background:#111; color:#fff; }
    .msg.agent .bubble { background:transparent; color:var(--text); }
    .msg.user .bubble { white-space:pre-wrap; }
    .msg.agent .bubble { white-space:normal; }
    /* Markdown rendered content inside agent bubbles */
    .msg.agent .bubble p { margin:0 0 8px; }
    .msg.agent .bubble p:last-child { margin-bottom:0; }
    .msg.agent .bubble h1,
    .msg.agent .bubble h2,
    .msg.agent .bubble h3,
    .msg.agent .bubble h4 { margin:12px 0 6px; font-weight:600; line-height:1.35; }
    .msg.agent .bubble h1 { font-size:1.4em; }
    .msg.agent .bubble h2 { font-size:1.25em; }
    .msg.agent .bubble h3 { font-size:1.1em; }
    .msg.agent .bubble h4 { font-size:1em; }
    .msg.agent .bubble code { font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:0.9em; background:rgba(0,0,0,.06); padding:1px 5px; border-radius:4px; }
    .msg.agent .bubble pre { margin:8px 0; padding:10px 12px; background:rgba(0,0,0,.04); border-radius:8px; overflow-x:auto; font-size:0.92em; line-height:1.5; }
    .msg.agent .bubble pre code { background:none; padding:0; border-radius:0; font-size:inherit; }
    .msg.agent .bubble ul, .msg.agent .bubble ol { margin:4px 0 8px; padding-left:20px; }
    .msg.agent .bubble li { margin-bottom:3px; }
    .msg.agent .bubble a { color:#2456b8; text-decoration:underline; }
    .msg.agent .bubble blockquote { margin:8px 0; padding:4px 12px; border-left:3px solid #d0d5dd; color:#5d6068; }
    .msg.agent .bubble table { border-collapse:collapse; margin:8px 0; width:100%; font-size:0.95em; }
    .msg.agent .bubble th, .msg.agent .bubble td { border:1px solid #d8dce3; padding:5px 10px; text-align:left; }
    .msg.agent .bubble th { background:rgba(0,0,0,.03); font-weight:600; }
    .msg.agent .bubble hr { border:none; border-top:1px solid #e0e3e8; margin:12px 0; }
    .msg.agent .bubble strong { font-weight:600; }
    .block { font-size:13px; padding:3px 0; }
    .block.reasoning, .block.mcp_tool_call, .block.web_search { padding:0; }
    /* Reasoning — whisper-quiet thinking trace.
       Looks like a soft annotation, not a structural card. */
    .reasoning { margin:1px 0; border:none; padding:2px 0; background:transparent; }
    .reasoning-summary { display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; font-size:11.5px; color:#b8b2a8; list-style:none; height:20px; }
    .reasoning-summary::-webkit-details-marker { display:none; }
    .reasoning-summary::marker { display:none; content:''; }
    .reasoning-dot { width:4px; height:4px; border-radius:50%; background:#d9d4cc; flex:0 0 4px; transition:all .35s ease; }
    .reasoning-dot.live { background:#cc6d4e; animation:think-glow 1.6s ease-in-out infinite; }
    @keyframes think-glow { 0%,100%{opacity:.3;box-shadow:0 0 0 0 rgba(204,109,78,.25)} 50%{opacity:1;box-shadow:0 0 2px 1px rgba(204,109,78,.15)} }
    .reasoning-label { font-weight:450; }
    .reasoning-meta { font-size:10.5px; color:#cfc9c0; }
    .reasoning-body { margin:4px 0 8px 6px; padding:6px 12px; border-radius:8px; background:#f9f8f7; white-space:pre-wrap; word-break:break-word; color:#787069; font-size:11.5px; line-height:1.65; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; max-height:300px; overflow-y:auto; }
    .block.command_execution { background:#0f1115; color:#e6e6e6; border-radius:8px; padding:8px 10px; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .cmd-head { display:flex; align-items:center; gap:6px; }
    .cmd-prompt { color:#7ee787; } .cmd-line { word-break:break-all; }
    .exit { margin-left:auto; font-size:11px; padding:1px 6px; border-radius:8px; } .exit.ok{background:#1f6f3f;color:#fff} .exit.bad{background:#a33;color:#fff}
    .cmd-out { margin:6px 0 0; white-space:pre-wrap; word-break:break-word; max-height:180px; overflow:auto; color:#cfd3d8; font-size:12px; }
    .block-title { font-weight:700; margin-bottom:4px; color:#3a3f45; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
    .file-list, .todo-list { display:grid; gap:3px; }
    .file-row { display:flex; align-items:center; gap:8px; }
    .tag { font-size:11px; padding:1px 6px; border-radius:6px; background:#e8e8ea; font-weight:600; }
    .tag.add{background:#dff5e3;color:#1f6f3f} .tag.delete{background:#fbe2e2;color:#a33} .tag.update{background:#e6eefb;color:#2456b8}
    .file-path { font-family:ui-monospace, Menlo, monospace; word-break:break-all; }
    .todo-list { list-style:none; padding:0; margin:0; }
    .todo-list li { display:flex; gap:8px; align-items:flex-start; }
    .todo-list li.done .todo-text { color:#9aa0a6; text-decoration:line-through; }
    .block.error { background:#fff4f4; border:1px solid #f3caca; border-radius:8px; padding:8px 10px; }
    .block.notice { align-self:center; background:#f4f4f5; color:#7b8087; font-size:12px; padding:4px 10px; border-radius:999px; }
    .error-body { color:#b3261e; white-space:pre-wrap; word-break:break-word; }
    .error-hint { color:#8a6d3b; margin-top:4px; font-size:12px; }
    .error-btn { margin-top:6px; padding:4px 10px; border-radius:6px; background:#111; color:#fff; font-size:12px; }
    .error-count { color:#b3261e; font-weight:700; }
    .error-detail { margin-top:6px; }
    .error-detail summary { cursor:pointer; color:#8a6d3b; font-size:12px; user-select:none; }
    .error-raw { margin-top:4px; color:#9a6a6a; font-size:11.5px; white-space:pre-wrap; word-break:break-word; font-family:ui-monospace, Menlo, monospace; }
    /* Collapse blocks/bubbles that ended up with no content (empty agent
       messages, empty reasoning) so they don't render as floating gray ovals. */
    .agent-console .block:empty { display:none; padding:0; }
    .msg .bubble:empty { display:none; }
    .thinking { color:#8c877e; font-size:12.5px; display:flex; align-items:center; gap:7px; padding:2px 0; }
    .thinking::before { content:''; display:block; width:8px; height:8px; border-radius:50%; background:#cc6d4e; animation:think-pulse 1.2s ease-in-out infinite; }
    .agent-status { width:100%; display:none; justify-content:space-between; gap:12px; color:#7b8087; font-size:12px; }
    .agent-status.visible { display:flex; }

    /* Tool-call — compact inline pill */
    .tool-call { display:inline-flex; align-items:center; gap:7px; height:28px; padding:0 10px; border-radius:14px; background:#f4f3f0; font-size:12.5px; color:#58544c; max-width:100%; margin:1px 0; }
    .tool-call.running { background:#fdf6f0; }
    .tool-call.ok { background:#f2f5f0; }
    .tool-call.bad { background:#fef4f4; }
    .tool-call.search { background:#f0f4fb; }
    .tool-call-icon { flex:0 0 auto; font-size:13px; line-height:1; display:grid; place-items:center; width:16px; }
    .tc-spin { display:block; width:12px; height:12px; border:2px solid #d9cbb8; border-top-color:#cc6d4e; border-radius:50%; animation: tc-rot .7s linear infinite; }
    @keyframes tc-rot { to { transform:rotate(360deg); } }
    .tool-call-name { font-weight:550; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tool-call-args { font-size:11px; color:#8c877e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; margin-left:2px; }

    /* Settings modal ------------------------------------------------------------ */
    .settings-overlay { position:fixed; inset:0; background:rgba(0,0,0,.36); display:grid; place-items:center; z-index:50; }
    .settings-modal { width:min(520px, 92%); background:#fff; border-radius:16px; padding:24px; box-shadow:0 30px 60px rgba(0,0,0,.25); display:grid; gap:14px; }
    .settings-title { margin:0; font-size:18px; }
    .settings-sub { margin:0; color:#7b8087; font-size:13px; line-height:1.5; }
    .settings-field { display:grid; gap:4px; }
    .settings-label { font-size:13px; font-weight:600; color:#3a3f45; }
    .settings-input { height:36px; border:1px solid var(--line); border-radius:8px; padding:0 10px; font-size:14px; font-family:inherit; }
    .settings-input:focus { outline:2px solid #111; border-color:#111; }
    .settings-radio-row { display:flex; gap:14px; }
    .settings-radio-label { display:flex; align-items:center; gap:5px; font-size:13px; cursor:pointer; }
    .settings-radio-label input[type="radio"] { accent-color:#111; }
    .settings-error { color:#b3261e; font-size:12px; min-height:14px; }
    .settings-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:4px; }
    .btn { padding:7px 14px; border-radius:8px; font-size:13px; font-weight:600; }
    .btn.ghost { background:#f0f0f1; } .btn.primary { background:#111; color:#fff; }

    /* Approvals modal ---------------------------------------------------------- */
    .approval-overlay { position:fixed; inset:0; background:rgba(0,0,0,.42); display:grid; place-items:center; z-index:60; }
    .approval-modal { width:min(480px, 92%); max-height:80vh; overflow:auto; background:#fff; border-radius:14px; padding:20px; box-shadow:0 20px 50px rgba(0,0,0,.24); display:grid; gap:12px; }

  <script src="../node_modules/marked/lib/marked.umd.js"></script>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="./renderer/ui/terminalPanel.js"></script>
  <script src="./renderer/ui/agentView.js"></script>
  <script src="./renderer/ui/settings.js"></script>
  <script src="./renderer/ui/approvals.js"></script>
  <script src="./renderer/ui/sidebar.js"></script>
  <script>
    const api = window.openCodex;
    // Unique session id per conversation — prevents item-id collisions
    // between replayed history and new streamed items, and isolates the
    // engine process so switching threads disposes the old one.
    let SESSION_ID = _freshSessionId();
    function _freshSessionId() {
      return 'sess-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    const shell = document.getElementById('stageShell');
    const terminal = document.getElementById('terminal');
    const agentOut = document.getElementById('agentOutput');
    const input = document.getElementById('promptInput');
    const agentStatus = document.getElementById('agentStatus');
    const sendButton = document.getElementById('sendPrompt');

    let workspace = null;
    let sessionStarted = false;
    let turnRunning = false;
    let stopRequested = false;
    let pendingResumeThreadId = null; // resume target, applied on the next send
    let openThreadId = null; // the history thread currently shown, if any

    const settingsModal = window.SettingsModal.create(api);
    const approvalsModal = window.ApprovalsModal.create(api);
    const view = window.AgentView.create(agentOut, {
      onOpenSettings: openSettings,
      onApprovalRequest: (approval) => approvalsModal.show(approval),
    });
    const sidebar = window.Sidebar.create(document.getElementById('projectList'), api, {
      onOpenThread,
      onThreadDeleted: (threadId) => {
        // If the deleted thread is the one on screen, reset to a clean state.
        if (threadId && threadId === openThreadId) {
          openThreadId = null;
          if (turnRunning) stopTurn();
          view.clear();
          setConversationActive(false);
          setTurnRunning(false);
          sessionStarted = false;
          pendingResumeThreadId = null;
        }
      },
    });
    const termPanel = window.TerminalPanel
      ? window.TerminalPanel.create(document.getElementById('terminalMount'), api)
      : null;
    let terminalOpen = false;

    function basename(value) {
      return (value || '').split(/[\\/]/).pop() || value || 'open_codex';
    }

    function setWorkspaceDisplay(pathOrName) {
      const name = basename(pathOrName);
      document.getElementById('workspaceLabel').textContent = name;
      document.getElementById('workspaceName').textContent = name;
    }

    function setConversationActive(on) {
      shell.classList.toggle('conversation-active', Boolean(on));
    }

    function setTurnRunning(on, stopping = false) {
      turnRunning = Boolean(on);
      stopRequested = Boolean(stopping);
      sendButton.classList.toggle('stop', turnRunning);
      sendButton.classList.toggle('stopping', stopRequested);
      sendButton.textContent = turnRunning ? '■' : '↑';
      sendButton.title = turnRunning ? '停止生成' : '发送';
      sendButton.disabled = stopRequested;
      input.disabled = stopRequested;
    }

    // Open a past conversation: dispose the current session, create a fresh
    // session id so new items don't collide with replayed history, then replay
    // the messages.  The engine thread is resumed on the *next* send.
    async function onOpenThread(thread, project) {
      // Dispose the old engine session so we don't leak Python processes.
      if (sessionStarted) {
        api.disposeEngine(SESSION_ID);
        sessionStarted = false;
      }
      SESSION_ID = 'thread-' + thread.id;
      workspace = project.path;
      openThreadId = thread.id;
      setWorkspaceDisplay(project.name || project.path);
      view.clear();
      setConversationActive(false);
      setTurnRunning(false);
      let messages = [];
      try {
        messages = await api.store.listMessages(thread.id);
      } catch (err) {
        messages = [];
      }
      // Sort agent items within each turn so the display order matches
      // the chronological order (reasoning → tools → answer).  Prefer the
      // monotonic _seq emitted by bridge.py; fall back to item-id parsing
      // for records written before _seq was added.
      function _sortKey(itemData) {
        if (itemData._seq != null) return itemData._seq;
        // Fallback: parse the item id.  Formats:
        //   reasoning-<sess>-<turn>[-<step>]  → base 0 + step*0.001
        //   tool-<sess>-<turn>-<n>            → base 1 + n*0.001
        //   msg-<sess>-<turn>                 → base 2
        //   usage-…                            → base 3
        const id = itemData.id || '';
        if (id.startsWith('reasoning-')) {
          const parts = id.split('-');
          const step = parts.length >= 4 ? parseInt(parts[3], 10) || 0 : 0;
          return step * 0.001;
        }
        if (id.startsWith('tool-')) {
          const parts = id.split('-');
          const n = parseInt(parts[parts.length - 1], 10) || 0;
          return 1 + n * 0.001;
        }
        if (id.startsWith('msg-')) return 2;
        return 3; // usage / unknown → end of turn
      }
      const sorted = [];
      let batch = [];
      for (const msg of messages) {
        if (msg.role === 'user') {
          batch.sort((a, b) => _sortKey(a._data) - _sortKey(b._data));
          for (const m of batch) sorted.push(m);
          batch = [];
          sorted.push(msg);
        } else {
          try { msg._data = JSON.parse(msg.data); } catch (_) { msg._data = {}; }
          batch.push(msg);
        }
      }
      batch.sort((a, b) => _sortKey(a._data) - _sortKey(b._data));
      for (const m of batch) sorted.push(m);
      // Render from the sorted list.
      for (const msg of sorted) {
        let data;
        try {
          data = JSON.parse(msg.data);
        } catch (err) {
          continue;
        }
        if (msg.role === 'user') view.addUserMessage(data.text || '');
        else view.renderItem(data, 'completed');
        setConversationActive(true);
      }
      // Don't start the engine just to view history — defer until the user
      // actually sends, so opening a thread never spawns a turn or needs creds.
      pendingResumeThreadId = thread.engine_thread_id || null;
      sessionStarted = false;
    }

    function setState(text) {
      document.getElementById('agentState').textContent = text;
      agentStatus.classList.toggle('visible', Boolean(text && text !== '就绪'));
    }

    function openSettings() {
      settingsModal.open(() => {
        sessionStarted = false; // engine is reset on save; start a fresh session next send
        refreshStatus();
      });
    }

    async function refreshStatus() {
      const [status, cfg] = await Promise.all([api.checkEngine(), api.getConfig()]);
      document.getElementById('agentVersion').textContent = status.version || status.command || '';
      if (!status.available) {
        setState('未找到 Codex CLI：请先在项目目录运行 npm install');
        return;
      }
      if (!cfg.baseUrl && !cfg.hasApiKey) {
        setState('请在「设置」中填写 Base URL 与 API Key');
      } else {
        setState('就绪');
      }
    }

    async function ensureSession() {
      if (sessionStarted) return true;
      const cfg = { cwd: workspace || undefined };
      if (pendingResumeThreadId) cfg.resumeThreadId = pendingResumeThreadId;
      const res = await api.startEngine(SESSION_ID, cfg);
      if (res && res.error) return false; // error already surfaced via engine:event
      pendingResumeThreadId = null;
      sessionStarted = true;
      return true;
    }

    async function sendPrompt() {
      const text = input.value.trim();
      if (!text) return;
      try {
        const cfg = await api.getConfig();
        if (!cfg.baseUrl && !cfg.hasApiKey) {
          openSettings();
          return;
        }
        view.addUserMessage(text);
        setConversationActive(true);
        input.value = '';
        const ok = await ensureSession();
        if (!ok) return;
        api.sendPrompt(SESSION_ID, text);
      } catch (err) {
        view.renderError(`发送失败: ${err.message}`);
      }
    }

    function stopTurn() {
      if (!turnRunning || stopRequested) return;
      setTurnRunning(true, true);
      setState('正在停止…');
      api.interrupt(SESSION_ID);
      sessionStarted = false;
    }

    document.getElementById('toolsButton').onclick = () => {
      shell.classList.toggle('tools-open');
      document.getElementById('toolsButton').classList.toggle('active');
    };
    document.getElementById('settingsButton').onclick = openSettings;
    document.getElementById('newChatButton').onclick = () => {
      if (turnRunning) stopTurn();
      if (sessionStarted) {
        api.disposeEngine(SESSION_ID);
        sessionStarted = false;
      }
      SESSION_ID = _freshSessionId();
      view.clear();
      setConversationActive(false);
      setTurnRunning(false);
      pendingResumeThreadId = null;
      openThreadId = null;
    };
    document.getElementById('workspaceButton').onclick = async () => {
      const next = await api.chooseWorkspace();
      if (!next) return;
      workspace = next;
      setWorkspaceDisplay(next);
      if (turnRunning) stopTurn();
      sessionStarted = false; // new workspace -> new session
      pendingResumeThreadId = null;
      openThreadId = null;
      view.clear();
      setConversationActive(false);
      setTurnRunning(false);
    };

    sendButton.onclick = () => {
      if (turnRunning) stopTurn();
      else sendPrompt();
    };
    input.addEventListener('keydown', (event) => {
      // Ignore Enter during IME composition (e.g. Chinese / Japanese input):
      // the Enter key confirms the candidate, it should NOT send the prompt.
      if (event.isComposing) return;
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        if (!turnRunning) sendPrompt();
      }
    });

    api.onEngineEvent((event) => {
      if (event.sessionId && event.sessionId !== SESSION_ID) return;
      view.handleEvent(event);
      if (event.kind === 'turn_started') {
        setConversationActive(true);
        setTurnRunning(true);
      } else if (event.kind === 'turn_completed' || event.kind === 'turn_failed' || event.kind === 'turn_interrupted' || event.kind === 'error') {
        setTurnRunning(false);
        setState('就绪'); // clear any transient "正在停止…" once the turn ends
      } else if (event.kind === 'item') {
        setConversationActive(true);
      }
      if (event.kind === 'thread_started' || event.kind === 'turn_completed') sidebar.refresh();
    });

    async function openTerminal() {
      if (!termPanel) {
        view.renderError('终端组件未加载，请运行 npm install 安装依赖。');
        return;
      }
      terminal.classList.add('open');
      document.getElementById('terminalButton').classList.add('active');
      if (!terminalOpen) {
        try {
          await termPanel.start(workspace || undefined);
          terminalOpen = true;
        } catch (err) {
          terminal.classList.remove('open');
          document.getElementById('terminalButton').classList.remove('active');
          terminalOpen = false;
          view.renderError(`终端启动失败: ${err.message}`);
          return;
        }
      }
      termPanel.fit();
      termPanel.focus();
    }
    function closeTerminal() {
      terminal.classList.remove('open');
      document.getElementById('terminalButton').classList.remove('active');
    }
    // Toggle open/close on the same button, like the tools button to its right.
    document.getElementById('terminalButton').onclick = () => {
      if (terminal.classList.contains('open')) closeTerminal();
      else openTerminal();
    };
    document.getElementById('closeTerminal').onclick = closeTerminal;

    const sidebarToggle = document.getElementById('sidebarToggle');
    if (sidebarToggle) {
      sidebarToggle.onclick = () => {
        document.querySelector('.app').classList.toggle('sidebar-collapsed');
      };
    }

    // --- Claude-style shell chrome: greeting, model chip, tabs, pills -------
    (function initShellChrome() {
      // Time-of-day greeting in the serif hero.
      const hour = new Date().getHours();
      const greet = hour < 5 ? '夜深了' : hour < 11 ? '早上好' : hour < 13 ? '中午好' : hour < 18 ? '下午好' : '晚上好';
      const greetEl = document.getElementById('greetingText');
      if (greetEl) greetEl.textContent = greet;

      // Reflect the configured model on the composer chip (best-effort).
      api.getConfig().then((cfg) => {
        const chip = document.getElementById('modelChip');
        if (chip && cfg && cfg.model) {
          chip.textContent = cfg.model + ' ';
          const c = document.createElement('span');
          c.className = 'muted';
          c.textContent = '⌄';
          chip.appendChild(c);
        }
      }).catch(() => {});

      // Minimal toast so not-yet-wired nav items still acknowledge the click.
      let toastTimer = null;
      function toast(msg) {
        let t = document.getElementById('shellToast');
        if (!t) {
          t = document.createElement('div');
          t.id = 'shellToast';
          t.className = 'toast';
          document.body.appendChild(t);
        }
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
      }

      // Segmented control routes to real surfaces (chat / tools panel / terminal).
      const segItems = Array.from(document.querySelectorAll('.seg-item'));
      const toolsBtn = document.getElementById('toolsButton');
      segItems.forEach((btn) => {
        btn.addEventListener('click', () => {
          segItems.forEach((b) => {
            const on = b === btn;
            b.classList.toggle('active', on);
            b.setAttribute('aria-selected', on ? 'true' : 'false');
          });
          const tab = btn.dataset.tab;
          if (tab === 'chat') {
            if (terminal.classList.contains('open')) closeTerminal();
            if (shell.classList.contains('tools-open')) {
              shell.classList.remove('tools-open');
              if (toolsBtn) toolsBtn.classList.remove('active');
            }
          } else if (tab === 'cowork') {
            if (!shell.classList.contains('tools-open')) {
              shell.classList.add('tools-open');
              if (toolsBtn) toolsBtn.classList.add('active');
            }
          } else if (tab === 'code') {
            openTerminal();
          }
        });
      });

      // Suggestion pills pre-fill the composer; the user edits, then sends.
      document.querySelectorAll('.pill').forEach((pill) => {
        pill.addEventListener('click', () => {
          const starter = pill.dataset.prompt || '';
          input.value = starter;
          input.focus();
          try { input.setSelectionRange(starter.length, starter.length); } catch (_) {}
        });
      });

      // Secondary nav: '项目' opens a workspace; the rest aren't backed yet.
      const workspaceBtn = document.getElementById('workspaceButton');
      const projectsNav = document.querySelector('[data-nav="projects"]');
      if (projectsNav && workspaceBtn) projectsNav.addEventListener('click', () => workspaceBtn.click());
      document.querySelectorAll('[data-nav="artifacts"], [data-nav="customize"], [data-nav="design"]').forEach((n) => {
        n.addEventListener('click', () => toast('该功能即将推出'));
      });
      const searchBtn = document.getElementById('searchButton');
      if (searchBtn) searchBtn.addEventListener('click', () => toast('搜索即将推出'));

      // Composer chrome: '+' chooses a workspace; chips open settings.
      const plus = document.querySelector('.compose-plus');
      if (plus && workspaceBtn) plus.addEventListener('click', () => workspaceBtn.click());
      const modelChip = document.getElementById('modelChip');
      if (modelChip) modelChip.addEventListener('click', openSettings);
      const approvalChip = document.getElementById('approvalChip');
      if (approvalChip) approvalChip.addEventListener('click', openSettings);
    })();

    refreshStatus();
    sidebar.refresh();
  </script>
</body>
</html>
