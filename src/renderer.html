<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Codex</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; --line:#e8e8e8; --muted:#8b8f97; --panel:#f7f7f8; --soft:#f3f3f4; --text:#202124; }
    * { box-sizing: border-box; }
    body { margin:0; height:100vh; overflow:hidden; color:var(--text); background:white; }
    button { font:inherit; border:0; background:none; cursor:pointer; color:inherit; }
    .app { display:grid; grid-template-columns: 348px 1fr; height:100vh; }
    .sidebar { background:#f6f6f7; border-right:1px solid #ddd; padding:68px 22px 22px; display:flex; flex-direction:column; gap:18px; }
    .traffic { position:fixed; top:18px; left:16px; display:flex; gap:14px; -webkit-app-region:drag; }
    .dot { width:20px; height:20px; border-radius:50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,.12); } .red{background:#ff5f57}.yellow{background:#ffbd2e}.green{background:#28c840}
    .side-actions, .project-list { display:grid; gap:18px; }
    .nav-row { display:flex; align-items:center; gap:14px; font-size:20px; font-weight:650; }
    .nav-row svg { width:22px; height:22px; stroke-width:1.8; }
    .section { margin-top:24px; color:#a4a7ac; font-size:20px; font-weight:700; }
    .conversation { padding-left:42px; color:#c3c5c8; font-size:18px; line-height:1.3; }
    .history { margin-left:42px; display:grid; gap:18px; font-size:19px; }
    .history-row { display:flex; justify-content:space-between; gap:20px; }
    .time { color:#8e9298; }
    .settings { margin-top:auto; }
    .main { display:grid; grid-template-rows:56px 1fr auto; min-width:0; }
    .topbar { height:56px; display:flex; align-items:center; justify-content:flex-end; gap:14px; padding:0 18px; border-bottom:1px solid transparent; -webkit-app-region:drag; }
    .pill { -webkit-app-region:no-drag; display:flex; align-items:center; gap:10px; padding:8px 15px; border:1px solid var(--line); border-radius:16px; font-size:20px; font-weight:750; box-shadow:0 1px 5px rgba(0,0,0,.04); background:white; }
    .cube { width:22px; height:22px; border-radius:6px; background:#191919; color:white; display:grid; place-items:center; font-size:13px; }
    .icon-button { -webkit-app-region:no-drag; width:32px; height:32px; border-radius:10px; display:grid; place-items:center; color:#6e737a; }
    .icon-button.active, .icon-button:hover { background:#f0f0f1; color:#111; }
    .stage-shell { display:grid; grid-template-columns:1fr 0; min-height:0; transition:grid-template-columns .22s ease; }
    .stage-shell.tools-open { grid-template-columns:minmax(520px, 1fr) 560px; }
    .stage { min-width:0; display:flex; align-items:center; justify-content:center; padding:54px; transition:border .22s ease; }
    .tools-open .stage { border-right:1px solid var(--line); }
    .hero { width:min(1040px, 88%); display:grid; gap:26px; justify-items:center; transform:translateY(-10px); }
    .tools-open .hero { width:min(620px, 88%); }
    h1 { margin:0; font-size:42px; line-height:1.15; font-weight:500; text-align:center; letter-spacing:-.03em; }
    .composer-wrap { width:100%; border-radius:28px; background:#f5f5f5; box-shadow:0 18px 35px rgba(0,0,0,.06); }
    .composer { min-height:142px; border:1px solid #dedede; border-radius:28px; background:white; padding:20px 24px 16px; display:grid; grid-template-rows:1fr auto; }
    .prompt-input { width:100%; min-height:58px; resize:none; border:0; outline:0; color:#222; font:20px/1.5 inherit; }
    .prompt-input::placeholder { color:#c7c9cc; font-weight:650; }
    .compose-row { display:flex; align-items:center; gap:16px; color:#777d84; font-size:20px; }
    .spacer { flex:1; }
    .send { width:48px; height:48px; border-radius:50%; background:#8f9093; color:white; display:grid; place-items:center; }
    .meta { height:64px; display:flex; align-items:center; gap:28px; padding:0 26px; color:#7b8087; font-size:19px; font-weight:650; }
    .tool-panel { overflow:hidden; display:flex; align-items:center; justify-content:center; padding:42px; }
    .tool-list { width:min(530px, 100%); display:grid; gap:8px; }
    .tool-card { height:58px; border-radius:10px; background:#f4f4f5; display:flex; align-items:center; gap:18px; padding:0 20px; font-size:20px; }
    .shortcut { margin-left:auto; color:#777; background:#e8e8e9; border-radius:14px; padding:2px 9px; font-size:16px; }
    .agent-console { width:100%; height:260px; border:1px solid var(--line); border-radius:18px; background:#111; color:#f2f2f2; padding:16px; font:14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; overflow:auto; white-space:pre-wrap; box-shadow:0 18px 35px rgba(0,0,0,.08); }
    .agent-status { width:100%; display:flex; justify-content:space-between; gap:16px; color:#7b8087; font-size:14px; }
    .terminal { border-top:1px solid var(--line); height:0; overflow:hidden; transition:height .22s ease; background:white; }
    .terminal.open { height:360px; }
    .terminal-tabs { height:54px; display:flex; align-items:center; padding:0 24px; gap:14px; }
    .tab { display:flex; align-items:center; gap:10px; background:#f4f4f5; border-radius:12px; padding:10px 16px; font-size:18px; font-weight:700; }
    .close { margin-left:auto; color:#858585; font-size:28px; }
    #terminalOutput { height:calc(100% - 54px); padding:0 24px 18px; font:18px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space:pre-wrap; outline:0; overflow:auto; }
    @media (max-width: 1160px) { .app { grid-template-columns:300px 1fr; } .stage-shell.tools-open { grid-template-columns:1fr 420px; } h1{font-size:36px} }
  </style>
</head>
<body>
  <div class="traffic"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
  <div class="app">
    <aside class="sidebar">
      <div class="side-actions">
        <div class="nav-row">✎ 新对话</div><div class="nav-row">⌕ 搜索</div><div class="nav-row">⌘ 插件</div><div class="nav-row">◴ 自动化</div>
      </div>
      <div class="section">项目</div>
      <div class="project-list">
        <div class="nav-row">▰ claudecode解析</div><div class="conversation">暂无对话</div>
        <div class="nav-row">▰ 面试code</div><div class="conversation">暂无对话</div>
        <div class="nav-row">▰ gui-agents</div><div class="history"><div class="history-row"><b>当前目录下/Users/bruis/...</b><span class="time">2 周</span></div></div>
        <div class="nav-row">▰ 剧本ai</div>
        <div class="history"><div class="history-row"><span>hello</span><span class="time">19 小时</span></div><div class="history-row"><span>?</span><span class="time">1 天</span></div><div class="history-row"><span>?</span><span class="time">1 天</span></div><div class="history-row"><span>?</span><span class="time">1 天</span></div><div class="history-row"><span>噢ok</span><span class="time">2 周</span></div></div>
        <div class="conversation">展开显示</div>
      </div>
      <div class="nav-row settings">⚙ 设置</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <button class="pill" id="workspaceButton"><span class="cube">◈</span><span id="workspaceLabel">打开位置</span><span>⌄</span></button>
        <button class="icon-button" id="terminalButton" title="打开终端">▭</button>
        <button class="icon-button" id="toolsButton" title="打开右侧边栏">◧</button>
      </header>
      <section class="stage-shell" id="stageShell">
        <div class="stage"><div class="hero"><h1>我们应该在 剧本ai 中构建什么？</h1><div class="agent-status"><span id="agentState">正在检测 Codex agent…</span><span id="agentVersion"></span></div><pre class="agent-console" id="agentOutput" tabindex="0"></pre><div class="composer-wrap"><div class="composer"><textarea class="prompt-input" id="promptInput" placeholder="随心输入，回车发送给 Codex agent；Shift+Enter 换行"></textarea><div class="compose-row"><span>＋</span><span>☝ 请求批准⌄</span><span class="spacer"></span><b>自定义</b><span>超高⌄</span><button class="send" id="sendPrompt">↑</button></div></div><div class="meta"><span id="workspaceMeta">▱ 剧本ai⌄</span><span>▭ 本地模式⌄</span><span>⌘ main⌄</span></div></div></div></div>
        <aside class="tool-panel"><div class="tool-list"><div class="tool-card">▣ 审查 <span class="shortcut">⌃⇧G</span></div><div class="tool-card">▹ 终端</div><div class="tool-card">◎ 浏览器 <span class="shortcut">⌘T</span></div><div class="tool-card">▰ 文件 <span class="shortcut">⌘P</span></div></div></aside>
      </section>
      <section class="terminal" id="terminal"><div class="terminal-tabs"><div class="tab">▹ 剧本ai</div><button class="icon-button">＋</button><button class="close" id="closeTerminal">×</button></div><pre id="terminalOutput" tabindex="0"></pre></section>
    </main>
  </div>
  <script>
    const shell = document.getElementById('stageShell');
    const terminal = document.getElementById('terminal');
    const out = document.getElementById('terminalOutput');
    const agentOut = document.getElementById('agentOutput');
    const input = document.getElementById('promptInput');
    let terminalId = null;
    let agentId = null;
    let workspace = null;

    document.getElementById('toolsButton').onclick = () => {
      shell.classList.toggle('tools-open');
      document.getElementById('toolsButton').classList.toggle('active');
    };

    async function startAgent() {
      document.getElementById('agentState').textContent = '正在启动 Codex agent…';
      const status = await window.openCodex.checkAgent();
      document.getElementById('agentVersion').textContent = status.version || status.command;
      if (!status.available) {
        document.getElementById('agentState').textContent = '未找到 Codex CLI，请先 npm install 或安装 codex';
        agentOut.textContent = `Codex agent not available: ${status.error || status.version || 'unknown error'}\n`;
        return;
      }
      const session = await window.openCodex.startAgent({ cwd: workspace, approvalMode: 'on-request', sandboxMode: 'workspace-write' });
      agentId = session.id;
      document.getElementById('agentState').textContent = `Codex agent 已连接：${session.cwd}`;
    }

    document.getElementById('workspaceButton').onclick = async () => {
      const next = await window.openCodex.chooseWorkspace();
      if (!next) return;
      workspace = next;
      document.getElementById('workspaceLabel').textContent = next.split(/[\/]/).pop() || next;
      document.getElementById('workspaceMeta').textContent = `▱ ${next}⌄`;
      if (agentId) {
        window.openCodex.disposeAgent(agentId);
        agentId = null;
        agentOut.textContent = '';
      }
      await startAgent();
    };

    async function sendPrompt() {
      const prompt = input.value.trim();
      if (!prompt) return;
      if (!agentId) await startAgent();
      if (!agentId) return;
      agentOut.textContent += `\n› ${prompt}\n`;
      window.openCodex.sendAgentPrompt(agentId, prompt);
      input.value = '';
      agentOut.scrollTop = agentOut.scrollHeight;
    }

    document.getElementById('sendPrompt').onclick = sendPrompt;
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendPrompt();
      }
    });
    window.openCodex.onAgentData(({ id, data }) => {
      if (id !== agentId) return;
      agentOut.textContent += data;
      agentOut.scrollTop = agentOut.scrollHeight;
    });
    window.openCodex.onAgentExit(({ id, exitCode }) => {
      if (id !== agentId) return;
      agentOut.textContent += `\n[Codex agent exited with code ${exitCode}]\n`;
      agentId = null;
      document.getElementById('agentState').textContent = 'Codex agent 已退出';
    });

    async function openTerminal() {
      terminal.classList.add('open');
      document.getElementById('terminalButton').classList.add('active');
      if (!terminalId) {
        const term = await window.openCodex.createTerminal(workspace);
        terminalId = term.id;
      }
      out.focus();
    }

    document.getElementById('terminalButton').onclick = openTerminal;
    document.getElementById('closeTerminal').onclick = () => {
      terminal.classList.remove('open');
      document.getElementById('terminalButton').classList.remove('active');
    };
    window.openCodex.onTerminalData(({ id, data }) => {
      if (id !== terminalId) return;
      out.textContent += data;
      out.scrollTop = out.scrollHeight;
    });
    window.openCodex.onTerminalExit(({ id, exitCode }) => {
      if (id !== terminalId) return;
      out.textContent += `\n[process exited with code ${exitCode}]\n`;
      terminalId = null;
    });
    out.addEventListener('keydown', (event) => {
      if (!terminalId) return;
      if (event.key === 'Enter') window.openCodex.writeTerminal(terminalId, '\r');
      else if (event.key === 'Backspace') window.openCodex.writeTerminal(terminalId, '\u007f');
      else if (event.key.length === 1) window.openCodex.writeTerminal(terminalId, event.key);
      event.preventDefault();
    });

    startAgent();
  </script>
</body>
</html>
